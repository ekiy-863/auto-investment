<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📊 投资看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- 顶部：时间 + 账户总览 -->
        <header class="header">
            <div class="header-actions">
    <button onclick="refreshData()" class="refresh-btn" id="refreshBtn">🔄 刷新数据</button>
    <div class="summary-cards" id="summaryCards">
        <div class="card"><div class="label">总投入</div><div class="value" id="totalCost">--</div></div>
        <div class="card"><div class="label">总市值</div><div class="value" id="totalMarket">--</div></div>
        <div class="card"><div class="label">总盈亏</div><div class="value" id="totalPnl">--</div></div>
        <div class="card"><div class="label">总盈亏率</div><div class="value" id="totalPnlRatio">--</div></div>
    </div>
</div>
        </header>

        <!-- 宽基指数 -->
        <section class="section">
            <h2>📈 宽基指数</h2>
            <div class="index-grid" id="indexGrid">
                <div class="index-item">上证指数<br /><span class="idx-price" id="idx_sh">--</span><br /><span class="idx-change" id="idx_sh_change">--</span></div>
                <div class="index-item">深证成指<br /><span class="idx-price" id="idx_sz">--</span><br /><span class="idx-change" id="idx_sz_change">--</span></div>
                <div class="index-item">创业板指<br /><span class="idx-price" id="idx_cy">--</span><br /><span class="idx-change" id="idx_cy_change">--</span></div>
                <div class="index-item">科创50<br /><span class="idx-price" id="idx_kc">--</span><br /><span class="idx-change" id="idx_kc_change">--</span></div>
            </div>
        </section>

        <!-- 持仓 + 盈亏 -->
        <section class="section">
            <h2>💰 持仓盈亏明细</h2>
            <div class="table-wrapper">
                <table id="holdingsTable">
                    <thead><tr><th>基金</th><th>持有份额</th><th>成本净值</th><th>最新净值</th><th>持仓市值</th><th>盈亏</th><th>盈亏率</th><th>今日涨跌</th></tr></thead>
                    <tbody id="holdingsBody"></tbody>
                </table>
            </div>
        </section>

        <!-- 图表区域 -->
        <section class="section charts-row">
            <div class="chart-box">
                <h3>📊 持仓盈亏分布</h3>
                <div id="pnlChart" style="height:300px;"></div>
            </div>
            <div class="chart-box">
                <h3>📈 持仓占比</h3>
                <div id="pieChart" style="height:300px;"></div>
            </div>
        </section>

        <!-- 市场数据 -->
        <section class="section">
            <h2>📊 市场数据</h2>
            <div class="market-grid">
                <div class="market-col">
                    <h4>📈 ETF涨幅 TOP5</h4>
                    <div class="table-wrapper">
                        <table id="etfTable">
                            <thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th></tr></thead>
                            <tbody id="etfBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="market-col">
                    <h4>💰 主力净流入 TOP5</h4>
                    <div class="table-wrapper">
                        <table id="sectorInflowTable">
                            <thead><tr><th>行业</th><th>净流入(亿)</th></tr></thead>
                            <tbody id="sectorInflowBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="market-col">
                    <h4>💸 主力净流出 TOP5</h4>
                    <div class="table-wrapper">
                        <table id="sectorOutflowTable">
                            <thead><tr><th>行业</th><th>净流入(亿)</th></tr></thead>
                            <tbody id="sectorOutflowBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>

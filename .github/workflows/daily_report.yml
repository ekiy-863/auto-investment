name: Daily Report

on:
  schedule:
    - cron: '30 2 * * 1-5'
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        run: python src/main.py
        env:
          TICKFLOW_KEY: ${{ secrets.TICKFLOW_KEY }}
          MX_APIKEY: ${{ secrets.MX_APIKEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}

      - name: Generate dashboard data
        run: python src/generate_dashboard.py
        env:
          TICKFLOW_KEY: ${{ secrets.TICKFLOW_KEY }}

      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md docs/data/dashboard.json
          git commit -m "Update daily report and dashboard $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push
